apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: hello-app
          image: embarkx/hello-spring:latest
          env:
          - name: ENV_VALUE
            value: "Hello from app.yaml"
          - name: DB_PASSWORD
            value: "CGFzc3dwcmQ="
          ports:
          - containerPort: 8080
